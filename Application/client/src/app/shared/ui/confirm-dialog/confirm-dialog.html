<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 px-4">
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <h2 class="text-lg font-semibold text-slate-900">{{ title() }}</h2>
    @if (message()) {
      <p class="mt-2 text-sm text-slate-600">{{ message() }}</p>
    }
    <div class="mt-6 flex justify-end gap-3">
      <button
        type="button"
        (click)="cancelled.emit()"
        [disabled]="busy()"
        class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 disabled:opacity-60"
      >
        Cancel
      </button>
      <button
        type="button"
        (click)="confirmed.emit()"
        [disabled]="busy()"
        class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-500 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ busy() ? 'Working…' : confirmLabel() }}
      </button>
    </div>
  </div>
</div>
