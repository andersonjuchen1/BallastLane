<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-4xl items-center justify-between px-4 py-4">
    <h1 class="text-lg font-semibold text-slate-900">Task Manager</h1>
    <div class="flex items-center gap-4">
      @if (user(); as u) {
        <span class="text-sm text-slate-600">{{ u.username }}</span>
      }
      <button
        type="button"
        (click)="logout()"
        class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
      >
        Sign out
      </button>
    </div>
  </div>
</header>

<main class="mx-auto max-w-4xl px-4 py-10">
  <p class="text-slate-500">Your tasks will appear here.</p>
</main>
